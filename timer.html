        <div class="sidebar">
                <ul>
                    <p>AI Study Planner</p>

                    <li><i class="fa-regular fa-calendar" style="margin-right: 10px;"></i><a href="planner.html">Planner</a></li>
                    <!--<li><i class="fa-solid fa-chart-line" style="margin-right: 10px;"></i>Analytics</li>-->
